<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Gradient for event pulse -->
    <radialGradient id="eventGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <!-- Agent perspective gradients -->
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gradC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Memory encoding shapes -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" letter-spacing="0.05em">
    SAME EVENT — DIFFERENT PERSPECTIVE
  </text>

  <!-- ═══════════════ EVENT SOURCE ═══════════════ -->
  <!-- Central event pulse -->
  <circle cx="400" cy="130" r="30" fill="url(#eventGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0.3;0.3" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="8;30;30;30;30" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="130" r="8" fill="#a78bfa" opacity="0">
    <animate attributeName="opacity" values="0;1;1;1;1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <text x="400" y="90" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11" opacity="0.8">
    MemoryEvent
  </text>

  <!-- ═══════════════ SIGNAL PATHS ═══════════════ -->
  <!-- Path from event to Agent A (left) -->
  <line x1="380" y1="145" x2="180" y2="230" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </line>
  <!-- Path from event to Agent B (center) -->
  <line x1="400" y1="155" x2="400" y2="230" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </line>
  <!-- Path from event to Agent C (right) -->
  <line x1="420" y1="145" x2="620" y2="230" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- Signal dots traveling down paths -->
  <circle r="4" fill="#3b82f6" filter="url(#softGlow)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;0;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="380;380;180;180;180" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="145;145;230;230;230" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#f59e0b" filter="url(#softGlow)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;0;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="400;400;400;400;400" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="155;155;230;230;230" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#10b981" filter="url(#softGlow)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;0;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="420;420;620;620;620" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="145;145;230;230;230" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══════════════ AGENT A (Analyst) ═══════════════ -->
  <g transform="translate(180, 260)">
    <!-- Agent body -->
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="url(#gradA)" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Perspective lens icon -->
    <circle cx="0" cy="-5" r="14" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.6;0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-5" r="6" fill="#3b82f6" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.3;0.3;0.8;0.3" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;6;6;10;6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="20" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Analyst</text>

    <!-- Encoded memory bubbles appearing -->
    <rect x="-50" y="40" width="40" height="12" rx="3" fill="#3b82f6" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.7;0.7" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="-30" y="49" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="7" opacity="0">
      0.82
      <animate attributeName="opacity" values="0;0;0;1;1" dur="6s" repeatCount="indefinite"/>
    </text>
    <rect x="10" y="40" width="40" height="12" rx="3" fill="#1d4ed8" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.5;0.5" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="49" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="7" opacity="0">
      trend
      <animate attributeName="opacity" values="0;0;0;1;1" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ═══════════════ AGENT B (Writer) ═══════════════ -->
  <g transform="translate(400, 260)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="url(#gradB)" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="0" cy="-5" r="14" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.6;0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-5" r="6" fill="#f59e0b" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.3;0.3;0.8;0.3" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;6;6;10;6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="20" text-anchor="middle" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Writer</text>

    <rect x="-50" y="40" width="40" height="12" rx="3" fill="#f59e0b" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.7;0.7" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="-30" y="49" text-anchor="middle" fill="#0f172a" font-family="monospace" font-size="7" opacity="0">
      0.45
      <animate attributeName="opacity" values="0;0;0;1;1" dur="6s" repeatCount="indefinite"/>
    </text>
    <rect x="10" y="40" width="40" height="12" rx="3" fill="#d97706" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.5;0.5" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="49" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="7" opacity="0">
      story
      <animate attributeName="opacity" values="0;0;0;1;1" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ═══════════════ AGENT C (Reviewer) ═══════════════ -->
  <g transform="translate(620, 260)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="url(#gradC)" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="0" cy="-5" r="14" fill="none" stroke="#10b981" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.6;0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-5" r="6" fill="#10b981" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.3;0.3;0.8;0.3" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;6;6;10;6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="20" text-anchor="middle" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Reviewer</text>

    <rect x="-50" y="40" width="40" height="12" rx="3" fill="#10b981" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.7;0.7" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="-30" y="49" text-anchor="middle" fill="#0f172a" font-family="monospace" font-size="7" opacity="0">
      0.91
      <animate attributeName="opacity" values="0;0;0;1;1" dur="6s" repeatCount="indefinite"/>
    </text>
    <rect x="10" y="40" width="40" height="12" rx="3" fill="#059669" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.5;0.5" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="49" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="7" opacity="0">
      risk
      <animate attributeName="opacity" values="0;0;0;1;1" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ═══════════════ SELECTIVE SHARING ═══════════════ -->
  <!-- Share arrow from Analyst to Shared Memory -->
  <line x1="200" y1="330" x2="350" y2="365" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0.6" dur="6s" repeatCount="indefinite"/>
  </line>
  <!-- Share dot -->
  <circle r="3" fill="#3b82f6" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="200;200;200;200;350" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="330;330;330;330;365" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Shared Memory zone -->
  <rect x="340" y="355" width="120" height="28" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4,2" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0.8" dur="6s" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="373" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9" opacity="0">
    SharedMemory (opt-in)
    <animate attributeName="opacity" values="0;0;0;0;0.8" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- ═══════════════ SALIENCE LABELS ═══════════════ -->
  <text x="400" y="395" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9" font-style="italic">
    each agent encodes the same event through its own lens
  </text>
</svg>
